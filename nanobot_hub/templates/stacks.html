{% extends "base.html" %}
{% block body %}
  <section class="page-header" data-testid="hub-stacks-page">
    <div class="page-header-main">
      <div class="page-header-copy">
        <p class="eyebrow">Stacks</p>
        <h2>Import proven MCP combinations</h2>
        <p class="muted">Browse stack recipes for research, coding, and automation workflows.</p>
      </div>
    </div>
  </section>
  <section class="panel" style="margin-top:24px;">
    <form class="search-form" hx-get="/partials/stacks-results" hx-target="#stack-results" hx-trigger="submit, keyup changed delay:300ms from:#stacks-q">
      <div class="search-row" style="grid-template-columns:minmax(0,1fr) auto;">
        <input id="stacks-q" type="text" name="q" value="{{ query }}" placeholder="Search stack name or use case" data-testid="hub-stacks-query">
        <button type="submit" data-testid="hub-stacks-search">Search</button>
      </div>
    </form>
  </section>
  <section id="stack-results" style="margin-top:24px;">
    {% include "partials/stacks_results.html" %}
  </section>
{% endblock %}
